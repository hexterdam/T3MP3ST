name: Sync fork with upstream

# Keeps hexterdam/T3MP3ST fast-forwarded to elder-plinius/T3MP3ST.
# Purpose: preserve a full mirror in case upstream is ever taken down.
# Fast-forward only — if the fork ever gains its own commits, this fails
# loudly instead of force-overwriting them (run it manually / rebase then).

on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC
  workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward main to upstream
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/elder-plinius/T3MP3ST.git
          git fetch upstream --tags
          git checkout main
          git merge --ff-only upstream/main
          git push origin main --tags
